name: DotNet Lambda Layer Performance Test
on:
  workflow_dispatch:
    inputs:
      test_runs:
        description: 'Number of test runs to perform'
        required: true
        default: 20
        type: number

      dotnet-version:
        description: 'dotnet version to use'
        required: true
        default: '8.0.x'
        type: string

      ADOT-DotNet-Branch:
        description: 'ADOT branch to use'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      DOTNET_VERSION: ${{ github.event.inputs.dotnet-version }}
      ADOT_DOTNET_BRANCH: ${{ github.event.inputs.ADOT-DotNet-Branch }}

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1

    - name: Checkout aws-otel-dotnet-instrumentation
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        repository: aws-observability/aws-otel-dotnet-instrumentation
        ref: ${{ env.ADOT_DOTNET_BRANCH }}
        path: aws-otel-dotnet-instrumentation

    - name: Log branch and commit info
      run: |
        cd aws-otel-dotnet-instrumentation
        echo "ADOT DotNet Branch: ${{ env.ADOT_DOTNET_BRANCH }}"
        echo "ADOT DotNet Commit Hash: $(git rev-parse HEAD)"

    - name: Setup .NET
      uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup AWS Lambda Tools
      run: dotnet tool install -g Amazon.Lambda.Tools

    - name: Build Distro
      run: |
        cd aws-otel-dotnet-instrumentation
        bash ./build.sh

    - name: Package Sample App
      run: |
        cd aws-otel-dotnet-instrumentation/sample-applications/lambda-test-apps/SimpleLambdaFunction
        dotnet lambda package -pl ./src/SimpleLambdaFunction --framework net8.0

    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dotnet-lambda-build-artifacts
        path: |
          aws-otel-dotnet-instrumentation/bin/aws-distro-opentelemetry-dotnet-instrumentation-linux-glibc-x64.zip
          aws-otel-dotnet-instrumentation/sample-applications/lambda-test-apps/SimpleLambdaFunction/src/SimpleLambdaFunction/bin/Release/net8.0/SimpleLambdaFunction.zip
          aws-otel-dotnet-instrumentation/sample-applications/lambda-test-apps/SimpleLambdaFunction/terraform/
        retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode: [full, baseline]
        include:
          - mode: full
            result_file: layer_results.txt
          - mode: baseline
            result_file: no_layer_results.txt

    env:
      NUM_TEST_RUNS: ${{ github.event.inputs.test_runs }}
      FUNCTION_NAME: SimpleLambdaFunction-${{ matrix.mode }}
      LAYER_NAME: aws-distro-opentelemetry-dotnet-instrumentation-${{ matrix.mode }}

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1

    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: dotnet-lambda-build-artifacts
        path: aws-otel-dotnet-instrumentation

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3.1.2

    - name: Deploy Lambda Function
      run: |
        cd aws-otel-dotnet-instrumentation/sample-applications/lambda-test-apps/SimpleLambdaFunction/terraform/lambda
        terraform init
        terraform apply -auto-approve \
          -var="function_name=${{ env.FUNCTION_NAME }}" \
          -var="sdk_layer_name=${{ env.LAYER_NAME }}"

    - name: Remove Application Signals Lambda Layer
      if: matrix.mode == 'baseline'
      run: |
        echo "Removing Lambda layer..."

        OUTPUT=$(aws lambda update-function-configuration \
            --function-name ${{ env.FUNCTION_NAME }} \
            --layers [])

        echo "Lambda configuration:"
        echo "$OUTPUT"

        LAYERS=$(echo "$OUTPUT" | jq -r '.Layers | length')

        if [ "$LAYERS" -ne 0 ]; then
            echo "::error::Found $LAYERS layer(s) still attached to the function"
            echo "::error::Layer details:"
            echo "$OUTPUT" | jq -r '.Layers'
            exit 1
        else
            echo "Layers successfully removed"
        fi

        echo "Waiting for function update to complete..."
        aws lambda wait function-updated --function-name ${{ env.FUNCTION_NAME }}

    - name: Checkout current repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        path: current-repo

    - name: Run Cold Start Iterations (${{ matrix.mode }})
      run: |
        cd current-repo
        chmod +x lambda-layer-perf-test/lambda-layer-run.sh
        ./lambda-layer-perf-test/lambda-layer-run.sh ${{ matrix.mode }} ${{ env.FUNCTION_NAME }}

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dotnet-${{ matrix.mode }}-results
        path: ${{ matrix.result_file }}
        retention-days: 90

    - name: Cleanup Terraform Resources
      if: success() || failure() || cancelled()
      run: |
        cd aws-otel-dotnet-instrumentation/sample-applications/lambda-test-apps/SimpleLambdaFunction/terraform/lambda
        echo "Starting Terraform cleanup..."
        terraform init
        terraform destroy -auto-approve \
          -var="function_name=${{ env.FUNCTION_NAME }}" \
          -var="sdk_layer_name=${{ env.LAYER_NAME }}"

  collect-results:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Download all test results
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        pattern: dotnet-*-results
        merge-multiple: true
        path: results

    - name: Upload combined results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dotnet-performance-test-results
        path: results/
        retention-days: 90
