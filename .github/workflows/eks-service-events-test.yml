# Manual dispatch workflow to validate EKS Service Events E2E tests across all 3 languages.
# Use this to verify the tests work once SE is available in the target region.
name: EKS Service Events E2E Validation
on:
  workflow_dispatch:
    inputs:
      aws-region:
        description: 'AWS region (must have SE-enabled CW Observability operator addon)'
        required: false
        type: string
        default: 'us-east-1'
      test-cluster-name:
        description: 'EKS cluster name'
        required: false
        type: string
        default: 'e2e-test-cluster'

permissions:
  id-token: write
  contents: read

jobs:
  python:
    uses: ./.github/workflows/python-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'eks-se-validation'

  java:
    uses: ./.github/workflows/java-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'eks-se-validation'

  node:
    uses: ./.github/workflows/node-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'eks-se-validation'
