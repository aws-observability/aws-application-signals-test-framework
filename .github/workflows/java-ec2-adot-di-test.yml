# This is a reusable workflow for running the Java EC2 Dynamic Instrumentation (DI) E2E canary
# for Application Signals. It is meant to be called from another workflow.
#
# Job graph: setup (deploy + create breakpoints) -> 4 parallel validate-<cell> jobs ->
# teardown (delete configs + terminate instance). The instance + breakpoints are created
# once in setup and shared; each validation runs in its own job reading CloudWatch Logs.
name: Java EC2 Dynamic Instrumentation Use Case
on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      caller-workflow-name:
        required: true
        type: string
      java-version:
        description: "Currently support version 11, 17, 21, 25"
        required: false
        type: string
        default: '11'
      cpu-architecture:
        description: "Permitted values: x86_64 or arm64"
        required: false
        type: string
        default: "x86_64"
      staging-jar-name:
        required: false
        default: 'aws-opentelemetry-agent.jar'
        type: string
      otel-source:
        required: false
        type: string
        default: 'github'
    outputs:
      job-started:
        value: ${{ jobs.setup.outputs.job-started }}
      validation-result:
        value: ${{ jobs.validation-result.outputs.validation-result }}

permissions:
  id-token: write
  contents: read

env:
  E2E_TEST_AWS_REGION: ${{ inputs.aws-region }}
  CALLER_WORKFLOW_NAME: ${{ inputs.caller-workflow-name }}
  JAVA_VERSION: ${{ inputs.java-version }}
  CPU_ARCHITECTURE: ${{ inputs.cpu-architecture }}
  ADOT_JAR_NAME: ${{ inputs.staging-jar-name }}
  OTEL_SOURCE: ${{ inputs.otel-source }}
  SAMPLE_APP_JAR: s3://aws-appsignals-sample-app-prod-${{ inputs.aws-region }}/java-main-service-v${{ inputs.java-version }}.jar
  TRAFFIC_GENERATOR_ZIP: s3://aws-appsignals-sample-app-prod-${{ inputs.aws-region }}/traffic-generator.zip
  E2E_TEST_ACCOUNT_ID: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}
  E2E_TEST_ROLE_NAME: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
  TEST_RESOURCES_FOLDER: ${GITHUB_WORKSPACE}
  REPOSITORY_NAME: ${{ github.event.repository.name }}
  DI_API_URL: https://application-signals.us-east-1.api.aws
  DI_REQUESTS_FILE: di-api-requests-java.json
  SERVICE_NAME_PREFIX: java-sample-application
  DI_ENVIRONMENT: ec2:java-di-main-service-asg
  IAM_INSTANCE_PROFILE: APP_SIGNALS_EC2_TEST_ROLE

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      job-started: ${{ steps.job-started.outputs.job-started }}
      testing-id: ${{ steps.outputs.outputs.testing-id }}
      service-name: ${{ steps.outputs.outputs.service-name }}
      instance-ami: ${{ steps.outputs.outputs.instance-ami }}
      instance-id: ${{ steps.outputs.outputs.instance-id }}
      line-breakpoint-hash: ${{ steps.create-configs.outputs.LINE_BREAKPOINT_LOCATION_HASH }}
      method-probe-hash: ${{ steps.create-configs.outputs.METHOD_PROBE_LOCATION_HASH }}
      method-breakpoint-hash: ${{ steps.create-configs.outputs.METHOD_BREAKPOINT_LOCATION_HASH }}
      method-probe-exception-hash: ${{ steps.create-configs.outputs.METHOD_PROBE_EXCEPTION_LOCATION_HASH }}
    steps:
      - name: Check if the job started
        id: job-started
        run: echo "job-started=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Generate testing id
        run: echo TESTING_ID="${{ github.run_id }}-${{ github.run_number }}-${RANDOM}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1

      - name: Set Get ADOT JAR command environment variable
        run: |
          if [ "${{ env.REPOSITORY_NAME }}" = "aws-otel-java-instrumentation" ]; then
            echo GET_ADOT_JAR_COMMAND="aws s3 cp s3://adot-main-build-staging-jar/${{ env.ADOT_JAR_NAME }} ./adot.jar" >> "$GITHUB_ENV"
          else
            echo GET_ADOT_JAR_COMMAND="wget -O adot.jar https://github.com/aws-observability/aws-otel-java-instrumentation/releases/latest/download/aws-opentelemetry-agent.jar" >> "$GITHUB_ENV"
          fi

      - name: Set Get CW Agent command environment variable
        run: |
          if [ "${{ env.REPOSITORY_NAME }}" = "amazon-cloudwatch-agent" ]; then
            echo GET_CW_AGENT_RPM_COMMAND= "aws s3 cp s3://${{ secrets.S3_INTEGRATION_BUCKET }}/integration-test/binary/${{ github.sha }}/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm ./cw-agent.rpm" >> "$GITHUB_ENV"
          else
            if [ "${{ env.CPU_ARCHITECTURE }}" = "x86_64" ]; then
              echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ inputs.aws-region }}.s3.${{ inputs.aws-region }}.amazonaws.com/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
            elif [ "${{ env.CPU_ARCHITECTURE }}" = "arm64" ]; then
              echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ inputs.aws-region }}.s3.${{ inputs.aws-region }}.amazonaws.com/amazon_linux/arm64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install awscurl for SigV4-signed control-plane calls
        run: pip install awscurl

      - name: Set up terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg"
          post-command: 'echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              && sudo apt update && sudo apt install terraform'
          sleep_time: 60

      - name: Initiate Terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "cd ${{ env.TEST_RESOURCES_FOLDER }}/terraform/java/ec2/adot-di && terraform init && terraform validate"
          cleanup: "rm -rf .terraform && rm -rf .terraform.lock.hcl"
          max_retry: 6
          sleep_time: 60

      - name: Deploy sample app via terraform
        working-directory: terraform/java/ec2/adot-di
        run: |
          retry_counter=0
          max_retry=2
          while [ $retry_counter -lt $max_retry ]; do
            echo "Attempt $retry_counter"
            deployment_failed=0
            terraform apply -auto-approve \
              -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
              -var="test_id=${{ env.TESTING_ID }}" \
              -var="sample_app_jar=${{ env.SAMPLE_APP_JAR }}" \
              -var="get_cw_agent_rpm_command=${{ env.GET_CW_AGENT_RPM_COMMAND }}" \
              -var="get_adot_jar_command=${{ env.GET_ADOT_JAR_COMMAND }}" \
              -var="language_version=${{ env.JAVA_VERSION }}" \
              -var="cpu_architecture=${{ env.CPU_ARCHITECTURE }}" \
              -var="di_api_url=${{ env.DI_API_URL }}" \
              -var="service_name_prefix=${{ env.SERVICE_NAME_PREFIX }}" \
              -var="di_environment=${{ env.DI_ENVIRONMENT }}" \
              -var="iam_instance_profile=${{ env.IAM_INSTANCE_PROFILE }}" \
              -var="traffic_generator_zip=${{ env.TRAFFIC_GENERATOR_ZIP }}" \
            || deployment_failed=$?

            if [ $deployment_failed -eq 1 ]; then
              echo "Terraform deployment was unsuccessful. Will attempt to retry deployment."
              terraform destroy -auto-approve \
                -var="test_id=${{ env.TESTING_ID }}"
              retry_counter=$(($retry_counter+1))
            else
              break
            fi

            if [ $retry_counter -eq $max_retry ]; then
              echo "Max retry reached, failed to deploy terraform and connect to the endpoint."
              exit 1
            fi
          done

      - name: Capture deployment outputs
        id: outputs
        working-directory: terraform/java/ec2/adot-di
        run: |
          echo "instance-ami=$(terraform output ec2_instance_ami)" >> "$GITHUB_OUTPUT"
          echo "instance-id=$(terraform output main_service_instance_id)" >> "$GITHUB_OUTPUT"
          echo "testing-id=${{ env.TESTING_ID }}" >> "$GITHUB_OUTPUT"
          echo "service-name=${{ env.SERVICE_NAME_PREFIX }}-${{ env.TESTING_ID }}" >> "$GITHUB_OUTPUT"

      - name: Create instrumentation configurations
        id: create-configs
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME_PREFIX }}-${{ env.TESTING_ID }}
        run: python3 .github/workflows/util/di/di-config-manager.py create

      - name: Verify all Get calls return the created configurations
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME_PREFIX }}-${{ env.TESTING_ID }}
          LINE_BREAKPOINT_LOCATION_HASH: ${{ steps.create-configs.outputs.LINE_BREAKPOINT_LOCATION_HASH }}
          METHOD_PROBE_LOCATION_HASH: ${{ steps.create-configs.outputs.METHOD_PROBE_LOCATION_HASH }}
          METHOD_BREAKPOINT_LOCATION_HASH: ${{ steps.create-configs.outputs.METHOD_BREAKPOINT_LOCATION_HASH }}
          METHOD_PROBE_EXCEPTION_LOCATION_HASH: ${{ steps.create-configs.outputs.METHOD_PROBE_EXCEPTION_LOCATION_HASH }}
        run: python3 .github/workflows/util/di/di-config-manager.py verify-created

      - name: Wait for agent to poll, apply, and emit snapshots
        run: sleep 90

  validate-line-breakpoint:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
      - uses: ./.github/workflows/actions/di-validate-snapshot
        with:
          language: java
          cell: line-breakpoint
          endpoint-port: 8080
          caller-workflow-name: ${{ inputs.caller-workflow-name }}
          region: ${{ env.E2E_TEST_AWS_REGION }}
          service-name: ${{ needs.setup.outputs.service-name }}
          testing-id: ${{ needs.setup.outputs.testing-id }}
          instance-ami: ${{ needs.setup.outputs.instance-ami }}
          instance-id: ${{ needs.setup.outputs.instance-id }}
          location-hash: ${{ needs.setup.outputs.line-breakpoint-hash }}

  validate-method-probe:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
      - uses: ./.github/workflows/actions/di-validate-snapshot
        with:
          language: java
          cell: method-probe
          endpoint-port: 8080
          caller-workflow-name: ${{ inputs.caller-workflow-name }}
          region: ${{ env.E2E_TEST_AWS_REGION }}
          service-name: ${{ needs.setup.outputs.service-name }}
          testing-id: ${{ needs.setup.outputs.testing-id }}
          instance-ami: ${{ needs.setup.outputs.instance-ami }}
          instance-id: ${{ needs.setup.outputs.instance-id }}
          location-hash: ${{ needs.setup.outputs.method-probe-hash }}

  validate-method-breakpoint:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
      - uses: ./.github/workflows/actions/di-validate-snapshot
        with:
          language: java
          cell: method-breakpoint
          endpoint-port: 8080
          caller-workflow-name: ${{ inputs.caller-workflow-name }}
          region: ${{ env.E2E_TEST_AWS_REGION }}
          service-name: ${{ needs.setup.outputs.service-name }}
          testing-id: ${{ needs.setup.outputs.testing-id }}
          instance-ami: ${{ needs.setup.outputs.instance-ami }}
          instance-id: ${{ needs.setup.outputs.instance-id }}
          location-hash: ${{ needs.setup.outputs.method-breakpoint-hash }}

  validate-method-probe-exception:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
      - uses: ./.github/workflows/actions/di-validate-snapshot
        with:
          language: java
          cell: method-probe-exception
          endpoint-port: 8080
          caller-workflow-name: ${{ inputs.caller-workflow-name }}
          region: ${{ env.E2E_TEST_AWS_REGION }}
          service-name: ${{ needs.setup.outputs.service-name }}
          testing-id: ${{ needs.setup.outputs.testing-id }}
          instance-ami: ${{ needs.setup.outputs.instance-ami }}
          instance-id: ${{ needs.setup.outputs.instance-id }}
          location-hash: ${{ needs.setup.outputs.method-probe-exception-hash }}

  # Aggregates the four validation job results into the workflow's validation-result output.
  validation-result:
    needs: [validate-line-breakpoint, validate-method-probe, validate-method-breakpoint, validate-method-probe-exception]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      validation-result: ${{ steps.result.outputs.validation-result }}
    steps:
      - name: Aggregate validation results
        id: result
        run: |
          if [ "${{ needs.validate-line-breakpoint.result }}" = "success" ] && [ "${{ needs.validate-method-probe.result }}" = "success" ] && [ "${{ needs.validate-method-breakpoint.result }}" = "success" ] && [ "${{ needs.validate-method-probe-exception.result }}" = "success" ]; then
            echo "validation-result=success" >> "$GITHUB_OUTPUT"
          else
            echo "validation-result=failure" >> "$GITHUB_OUTPUT"
          fi

  teardown:
    needs: [setup, validate-line-breakpoint, validate-method-probe, validate-method-breakpoint, validate-method-probe-exception]
    if: always() && needs.setup.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE_NAME: ${{ needs.setup.outputs.service-name }}
      LINE_BREAKPOINT_LOCATION_HASH: ${{ needs.setup.outputs.line-breakpoint-hash }}
      METHOD_PROBE_LOCATION_HASH: ${{ needs.setup.outputs.method-probe-hash }}
      METHOD_BREAKPOINT_LOCATION_HASH: ${{ needs.setup.outputs.method-breakpoint-hash }}
      METHOD_PROBE_EXCEPTION_LOCATION_HASH: ${{ needs.setup.outputs.method-probe-exception-hash }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}

      - name: Install awscurl for SigV4-signed control-plane calls
        run: pip install awscurl

      - name: Delete instrumentation configurations
        id: delete-configs
        if: env.LINE_BREAKPOINT_LOCATION_HASH != '' || env.METHOD_PROBE_LOCATION_HASH != '' || env.METHOD_BREAKPOINT_LOCATION_HASH != '' || env.METHOD_PROBE_EXCEPTION_LOCATION_HASH != ''
        continue-on-error: true
        run: python3 .github/workflows/util/di/di-config-manager.py delete

      - name: Verify all Get calls return ResourceNotFound after delete
        if: steps.delete-configs.outcome == 'success'
        run: python3 .github/workflows/util/di/di-config-manager.py verify-deleted

      # Tear down the per-run AWS resources the setup job created (the instance and its key
      # pair). terraform destroy is not usable here — the tfstate lives on the setup runner,
      # which is gone — so clean up directly by id/name. The default VPC is shared and not touched.
      - name: Terminate EC2 instance
        if: needs.setup.outputs.instance-id != ''
        continue-on-error: true
        run: |
          aws ec2 terminate-instances --region ${{ env.E2E_TEST_AWS_REGION }} \
            --instance-ids ${{ needs.setup.outputs.instance-id }}

      - name: Delete EC2 key pair
        if: needs.setup.outputs.testing-id != ''
        continue-on-error: true
        run: |
          aws ec2 delete-key-pair --region ${{ env.E2E_TEST_AWS_REGION }} \
            --key-name "instance_key-${{ needs.setup.outputs.testing-id }}"
