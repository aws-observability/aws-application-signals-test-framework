# Reusable workflow for running the Node EKS Service Events E2E test.
# Validates the 5 Service Events signals on EKS with operator-injected ADOT Node.js.
# Installs Application Signals (the amazon-cloudwatch-observability operator) per-run via
# enable-app-signals.sh, optionally patches in the ADOT image under test, then cleans up.
name: Node EKS Service Events Use Case
on:
  workflow_call:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      test-cluster-name:
        required: true
        type: string
      caller-workflow-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '20'
      adot-image-name:
        description: "Optional ADOT Node.js instrumentation image to patch into the operator. When empty, the cluster operator's default (SE-capable) ADOT image is validated."
        required: false
        type: string
      cw-agent-operator-tag:
        description: "Optional CloudWatch Agent Operator image tag to patch in. When empty, the default operator image is used."
        required: false
        type: string
    outputs:
      job-started:
        value: ${{ jobs.node-eks-service-events.outputs.job-started }}
      validation-result:
        value: ${{ jobs.node-eks-service-events.outputs.validation-result }}
  workflow_dispatch:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      test-cluster-name:
        required: false
        type: string
        default: 'e2e-node-adot-test'
      adot-image-name:
        description: "Optional ADOT Node.js instrumentation image to patch into the operator. When empty, the cluster operator's default (SE-capable) ADOT image is validated."
        required: false
        type: string
      cw-agent-operator-tag:
        description: "Optional CloudWatch Agent Operator image tag to patch in. When empty, the default operator image is used."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  E2E_TEST_AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
  CALLER_WORKFLOW_NAME: ${{ inputs.caller-workflow-name || 'manual-dispatch' }}
  E2E_TEST_ACCOUNT_ID: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}
  E2E_TEST_ROLE_NAME: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
  TEST_RESOURCES_FOLDER: ${GITHUB_WORKSPACE}
  CLUSTER_NAME: ${{ inputs.test-cluster-name || 'e2e-node-adot-test' }}
  NODE_VERSION: ${{ inputs.node-version || '20' }}
  ADOT_IMAGE_NAME: ${{ inputs.adot-image-name }}
  CW_AGENT_OPERATOR_TAG: ${{ inputs.cw-agent-operator-tag }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}
  # App Signals data log group — the SE log group (/aws/service-events/<svc>) is separate
  # and validated below; both are preserved during cleanup (delete line stripped).
  LOG_GROUP_NAME: /aws/application-signals/data

jobs:
  node-eks-service-events:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      job-started: ${{ steps.job-started.outputs.job-started }}
      validation-result: ${{ steps.validation-result.outputs.validation-result }}
    steps:
      - name: Check if the job started
        id: job-started
        run: echo "job-started=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Initiate Gradlew Daemon
        id: initiate-gradlew
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      - name: Generate testing id
        run: echo TESTING_ID="${{ github.run_id }}-${{ github.run_number }}-${RANDOM}" >> "$GITHUB_ENV"

      - name: Set Service Name
        run: echo SERVICE_NAME="node-sample-application-${{ env.TESTING_ID }}" >> "$GITHUB_ENV"

      - name: Set Namespace
        run: echo SAMPLE_APP_NAMESPACE="ns-${{ github.run_id }}-${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Download enablement script
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          pre-command: "mkdir enablement-script && cd enablement-script"
          command: "wget https://raw.githubusercontent.com/aws-observability/application-signals-demo/main/scripts/eks/appsignals/enable-app-signals.sh
          && wget https://raw.githubusercontent.com/aws-observability/application-signals-demo/main/scripts/eks/appsignals/clean-app-signals.sh"
          cleanup: "rm -f enable-app-signals.sh && rm -f clean-app-signals.sh"
          post-command: "chmod +x enable-app-signals.sh && chmod +x clean-app-signals.sh"

      # Do not delete the App Signals data log group (shared across sources). The SE log group
      # (/aws/service-events/<svc>) is also preserved — clean-app-signals.sh does not target it.
      - name: Remove log group deletion command
        if: always()
        working-directory: enablement-script
        run: |
          delete_log_group="aws logs delete-log-group --log-group-name '${{ env.LOG_GROUP_NAME }}' --region \$REGION"
          sed -i "s#$delete_log_group##g" clean-app-signals.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1

      - name: Retrieve account
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ACCOUNT_ID, region-account/${{ env.E2E_TEST_AWS_REGION }}
            NODE_MAIN_SAMPLE_APP_IMAGE, e2e-test/node-main-sample-app-image

      - name: Configure AWS Credentials
        if: ${{ github.event.repository.name == 'aws-application-signals-test-framework' }}
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: ${{ env.E2E_TEST_AWS_REGION }}

      - name: Set Sample App Image
        run: echo MAIN_SAMPLE_APP_IMAGE_ARN="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.E2E_TEST_AWS_REGION }}.amazonaws.com/${{ env.NODE_MAIN_SAMPLE_APP_IMAGE }}" >> "$GITHUB_ENV"

      # local directory to store the kubernetes config
      - name: Create kubeconfig directory
        run: mkdir -p ${{ github.workspace }}/.kube

      - name: Set KUBECONFIG environment variable
        run: echo KUBECONFIG="${{ github.workspace }}/.kube/config" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.E2E_TEST_AWS_REGION }}

      - name: Download and install eksctl
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          pre-command: 'mkdir ${{ github.workspace }}/eksctl'
          command: 'curl -sLO "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
            && tar -xzf eksctl_Linux_amd64.tar.gz -C ${{ github.workspace }}/eksctl && rm eksctl_Linux_amd64.tar.gz'
          cleanup: 'rm -f eksctl_Linux_amd64.tar.gz'

      - name: Add eksctl to Github Path
        run: echo "${{ github.workspace }}/eksctl" >> "$GITHUB_PATH"

      # Delete lingering sample app namespaces from previous test runs
      - name: Delete all sample app namespaces
        continue-on-error: true
        timeout-minutes: 5
        run: kubectl get namespace | awk '/^ns-[0-9]+-[0-9]+/{print $1}' | xargs --no-run-if-empty kubectl delete namespace

      - name: Create role for AWS access from the sample app
        id: create_service_account
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "eksctl create iamserviceaccount \
          --name service-account-${{ env.TESTING_ID }} \
          --namespace ${{ env.SAMPLE_APP_NAMESPACE }} \
          --cluster ${{ env.CLUSTER_NAME }} \
          --role-name eks-s3-access-${{ env.TESTING_ID }} \
          --attach-policy-arn arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess \
          --region ${{ env.E2E_TEST_AWS_REGION }} \
          --approve"
          cleanup: "eksctl delete iamserviceaccount \
          --name service-account-${{ env.TESTING_ID }} \
          --namespace ${{ env.SAMPLE_APP_NAMESPACE }} \
          --cluster ${{ env.CLUSTER_NAME }} \
          --region ${{ env.E2E_TEST_AWS_REGION }}"
          sleep_time: 60

      - name: Set up terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg"
          post-command: 'echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              && sudo apt update && sudo apt install terraform'
          sleep_time: 60

      - name: Initiate Terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "cd ${{ env.TEST_RESOURCES_FOLDER }}/terraform/node/eks/service-events && terraform init && terraform validate"
          cleanup: "rm -rf .terraform && rm -rf .terraform.lock.hcl"
          max_retry: 6
          sleep_time: 60

      - name: Deploy sample app via terraform and install Application Signals
        id: deploy-node-app
        working-directory: terraform/node/eks/service-events
        run: |
          # Deploy the sample app, then install Application Signals (which installs the
          # amazon-cloudwatch-observability operator that injects ADOT into the SE-annotated
          # pods). Retry up to 2 times on transient failures.
          retry_counter=0
          max_retry=2
          while [ $retry_counter -lt $max_retry ]; do
            echo "Attempt $retry_counter"
            deployment_failed=0
            terraform apply -auto-approve \
              -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
              -var="test_id=${{ env.TESTING_ID }}" \
              -var="eks_cluster_name=${{ env.CLUSTER_NAME }}" \
              -var="eks_cluster_context_name=$(kubectl config current-context)" \
              -var="test_namespace=${{ env.SAMPLE_APP_NAMESPACE }}" \
              -var="service_account_aws_access=service-account-${{ env.TESTING_ID }}" \
              -var="node_app_image=${{ env.MAIN_SAMPLE_APP_IMAGE_ARN }}" \
              -var="account_id=${{ env.ACCOUNT_ID }}" \
              -var="kube_directory_path=${{ github.workspace }}/.kube" \
              -var="service_events_git_commit_sha=${{ github.sha }}" \
            || deployment_failed=$?

            if [ $deployment_failed -eq 0 ]; then
              echo "Installing Application Signals to the sample app"
              . ${{ env.TEST_RESOURCES_FOLDER }}/.github/workflows/util/execute_and_retry.sh
              execute_and_retry 3 \
              "${{ env.TEST_RESOURCES_FOLDER }}/enablement-script/enable-app-signals.sh \
              ${{ env.CLUSTER_NAME }} \
              ${{ env.E2E_TEST_AWS_REGION }} \
              ${{ env.SAMPLE_APP_NAMESPACE }}" \
              "${{ env.TEST_RESOURCES_FOLDER }}/enablement-script/clean-app-signals.sh \
              ${{ env.CLUSTER_NAME }} \
              ${{ env.E2E_TEST_AWS_REGION }} \
              ${{ env.SAMPLE_APP_NAMESPACE }} && \
              aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.E2E_TEST_AWS_REGION }}" \
              60

              aws eks update-kubeconfig --region ${{ env.E2E_TEST_AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

              # Restart pods so the now-installed operator injects ADOT instrumentation, then wait.
              execute_and_retry 2 "kubectl delete pods --all -n ${{ env.SAMPLE_APP_NAMESPACE }}" "" 60
              execute_and_retry 2 "kubectl wait --for=condition=Ready --request-timeout '5m' pod --all -n ${{ env.SAMPLE_APP_NAMESPACE }}" "" 10
            fi

            if [ $deployment_failed -ne 0 ]; then
              echo "Deployment failed. Cleaning up Application Signals and terraform, then retrying."
              ${{ env.TEST_RESOURCES_FOLDER }}/enablement-script/clean-app-signals.sh \
              ${{ env.CLUSTER_NAME }} \
              ${{ env.E2E_TEST_AWS_REGION }} \
              ${{ env.SAMPLE_APP_NAMESPACE }} || true
              aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.E2E_TEST_AWS_REGION }}
              terraform destroy -auto-approve \
                -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
                -var="test_id=${{ env.TESTING_ID }}" \
                -var="eks_cluster_name=${{ env.CLUSTER_NAME }}" \
                -var="eks_cluster_context_name=$(kubectl config current-context)" \
                -var="test_namespace=${{ env.SAMPLE_APP_NAMESPACE }}" \
                -var="service_account_aws_access=service-account-${{ env.TESTING_ID }}" \
                -var="node_app_image=${{ env.MAIN_SAMPLE_APP_IMAGE_ARN }}" \
                -var="account_id=${{ env.ACCOUNT_ID }}"
              retry_counter=$(($retry_counter+1))
            else
              break
            fi

            if [ $retry_counter -ge $max_retry ]; then
              echo "Max retry reached. Exiting."
              exit 1
            fi
          done

      # Optionally patch in the ADOT image / operator tag under test. Skipped on manual
      # dispatch with no image, in which case the operator's default (SE-capable) ADOT is used.
      - name: Get ECR to Patch
        if: ${{ env.ADOT_IMAGE_NAME != '' || env.CW_AGENT_OPERATOR_TAG != '' }}
        run: |
          if [ "${{ env.REPOSITORY_NAME }}" = "amazon-cloudwatch-agent-operator" ]; then
            echo PATCH_IMAGE_ARN="${{ vars.ECR_OPERATOR_STAGING_REPO }}:${{ env.CW_AGENT_OPERATOR_TAG }}" >> "$GITHUB_ENV"
          elif [ "${{ env.REPOSITORY_NAME }}" = "aws-otel-js-instrumentation" ]; then
            echo PATCH_IMAGE_ARN="${{ env.ADOT_IMAGE_NAME }}" >> "$GITHUB_ENV"
          fi

      - name: Patch Image and Check Diff
        id: patch-image
        if: ${{ env.ADOT_IMAGE_NAME != '' || env.CW_AGENT_OPERATOR_TAG != '' }}
        uses: ./.github/workflows/actions/patch_image_and_check_diff
        with:
          repository: ${{ env.REPOSITORY_NAME }}
          patch-image-arn: ${{ env.PATCH_IMAGE_ARN }}
          sample-app-namespace: ${{ env.SAMPLE_APP_NAMESPACE }}

      - name: Get app endpoint and configure traffic generator
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: echo "APP_ENDPOINT=$(kubectl get pods -n ${{ env.SAMPLE_APP_NAMESPACE }} --selector=app=node-app -o jsonpath='{.items[0].status.podIP}'):8000" >> "$GITHUB_ENV"
          max_retry: 3
          sleep_time: 10

      # The Node traffic-generator command is overridden in terraform/node/eks/service-events/main.tf
      # to drive the Node SE routes (/success, /aws-sdk-call, /exception) and waits only on
      # MAIN_ENDPOINT — it does not use the generic generator's REMOTE_ENDPOINT/ID gating. So set
      # only MAIN_ENDPOINT here. (The python/java workflows keep the generic generator and therefore
      # also set REMOTE_ENDPOINT.)
      - name: Set traffic generator endpoints
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: kubectl set env -n ${{ env.SAMPLE_APP_NAMESPACE }} deployment/traffic-generator MAIN_ENDPOINT=${{ env.APP_ENDPOINT }}
          max_retry: 3
          sleep_time: 10

      - name: Wait for signals to propagate
        run: sleep 60

      - name: Initiate Gradlew Daemon
        if: steps.initiate-gradlew.outcome == 'failure'
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      # ---- Service Events log signals ----

      - name: Validate DeploymentEvent log
        id: deployment-event-validation
        run: ./gradlew validator:run --args='-c node/eks/service-events/deployment-event-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.APP_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --rollup'

      - name: Validate IncidentSnapshot log
        id: incident-snapshot-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c node/eks/service-events/incident-snapshot-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.APP_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --rollup'

      - name: Validate IncidentSnapshot log (latency trigger)
        id: incident-snapshot-latency-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c node/eks/service-events/incident-snapshot-latency-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.APP_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --rollup'

      # ---- Service Events metric signals ----

      - name: Validate EndpointErrorMetric (count) via PromQL
        id: endpoint-error-metric-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure' || steps.incident-snapshot-latency-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c node/eks/service-events/endpoint-error-metric-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.APP_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --service-name ${{ env.SERVICE_NAME }}
          --rollup'

      - name: Validate FunctionCall (service.function.duration) via PromQL
        id: function-call-metric-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure' || steps.incident-snapshot-latency-validation.outcome == 'failure' || steps.endpoint-error-metric-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c node/eks/service-events/function-call-metric-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.APP_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --service-name ${{ env.SERVICE_NAME }}
          --rollup'

      - name: Refresh AWS Credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: ${{ env.E2E_TEST_AWS_REGION }}

      - name: Save test results
        if: always()
        id: validation-result
        run: |
          if [ "${{ steps.deployment-event-validation.outcome }}" = "success" ] && \
             [ "${{ steps.incident-snapshot-validation.outcome }}" = "success" ] && \
             [ "${{ steps.incident-snapshot-latency-validation.outcome }}" = "success" ] && \
             [ "${{ steps.endpoint-error-metric-validation.outcome }}" = "success" ] && \
             [ "${{ steps.function-call-metric-validation.outcome }}" = "success" ]; then
            echo "validation-result=success" >> "$GITHUB_OUTPUT"
          else
            echo "validation-result=failure" >> "$GITHUB_OUTPUT"
          fi

      # ---- Clean up (each step scoped to this run's namespace / resources only) ----

      - name: Clean Up Application Signals
        if: always()
        continue-on-error: true
        working-directory: enablement-script
        run: |
          ./clean-app-signals.sh \
          ${{ env.CLUSTER_NAME }} \
          ${{ env.E2E_TEST_AWS_REGION }} \
          ${{ env.SAMPLE_APP_NAMESPACE }}

      # clean-app-signals.sh removes the current cluster from kubeconfig; re-add it for the
      # subsequent destroy/delete steps.
      - name: Restore kubeconfig
        if: always()
        continue-on-error: true
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.E2E_TEST_AWS_REGION }}

      - name: Terraform destroy
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        working-directory: terraform/node/eks/service-events
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
            -var="test_id=${{ env.TESTING_ID }}" \
            -var="eks_cluster_name=${{ env.CLUSTER_NAME }}" \
            -var="eks_cluster_context_name=$(kubectl config current-context)" \
            -var="test_namespace=${{ env.SAMPLE_APP_NAMESPACE }}" \
            -var="service_account_aws_access=service-account-${{ env.TESTING_ID }}" \
            -var="node_app_image=${{ env.MAIN_SAMPLE_APP_IMAGE_ARN }}" \
            -var="account_id=${{ env.ACCOUNT_ID }}" \
            -var="kube_directory_path=${{ github.workspace }}/.kube"

      - name: Delete namespace
        if: always()
        continue-on-error: true
        run: kubectl delete namespace ${{ env.SAMPLE_APP_NAMESPACE }} --wait=false

      - name: Remove aws access service account
        if: always()
        continue-on-error: true
        run: |
          eksctl delete iamserviceaccount \
          --name service-account-${{ env.TESTING_ID }} \
          --namespace ${{ env.SAMPLE_APP_NAMESPACE }} \
          --cluster ${{ env.CLUSTER_NAME }} \
          --region ${{ env.E2E_TEST_AWS_REGION }}
