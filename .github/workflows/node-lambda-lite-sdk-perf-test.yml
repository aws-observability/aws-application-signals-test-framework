name: Node Lambda Lite SDK Performance Test
on:
  workflow_dispatch:
    inputs:
      test_runs:
        description: 'Number of test runs to perform'
        required: true
        default: 20
        type: number

      node_version:
        description: 'The Node.js version to run the test'
        required: true
        default: '20'
        type: string

      ADOT-Node-Branch:
        description: 'ADOT Node branch to use'
        required: true
        default: 'otel-lite-sdk'
        type: string

jobs:
  node-lambda-lite-sdk-performance-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      NUM_TEST_RUNS: ${{ github.event.inputs.test_runs }}
      NODE_VERSION: ${{ github.event.inputs.node_version }}
      ADOT_NODE_BRANCH: ${{ github.event.inputs.ADOT-Node-Branch }}

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1

    - name: Checkout aws-otel-js-instrumentation
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        repository: aws-observability/aws-otel-js-instrumentation
        ref: ${{ env.ADOT_NODE_BRANCH }}
        path: aws-otel-js-instrumentation

    - name: Log branch and commit info
      run: |
        cd aws-otel-js-instrumentation
        echo "ADOT Node Branch: ${{ env.ADOT_NODE_BRANCH }}"
        echo "ADOT Node Commit Hash: $(git rev-parse HEAD)"

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3.1.2

    - name: Build Lambda Layer
      run: |
        cd aws-otel-js-instrumentation/lambda-layer
        chmod +x build.sh
        ./build.sh

    - name: Checkout current repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        path: current-repo

    # Single combined run: Full SDK, Lite SDK (fast start), and No Layer (baseline)
    - name: Run Cold Start Iterations - All Scenarios
      run: |
        cd current-repo

        # The function is deployed with the layer already attached; capture its
        # ARN so the combined script can re-attach it for the SDK scenarios.
        LAYER_ARN=$(aws lambda get-function-configuration \
          --function-name aws-opentelemetry-distro-nodejs \
          --query 'Layers[0].Arn' --output text)

        if [ -z "$LAYER_ARN" ] || [ "$LAYER_ARN" = "None" ]; then
          echo "::error::No layer attached to aws-opentelemetry-distro-nodejs"
          exit 1
        fi
        echo "Using layer ARN: $LAYER_ARN"

        chmod +x lambda-layer-perf-test/lambda-perf-test-all.sh
        ./lambda-layer-perf-test/lambda-perf-test-all.sh aws-opentelemetry-distro-nodejs "$LAYER_ARN"

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: node-lite-sdk-performance-test-results
        path: |
          no_layer_results.txt
          layer_results.txt
          lite_sdk_results.txt
        retention-days: 90

    - name: Cleanup Terraform Resources
      if: success() || failure() || cancelled()
      run: |
        cd aws-otel-js-instrumentation/lambda-layer/terraform/lambda
        echo "Starting Terraform cleanup..."
        terraform init
        terraform destroy -auto-approve
