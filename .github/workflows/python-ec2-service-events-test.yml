# This is a reusable workflow for running the Python EC2 Service Events E2E test for
# Application Signals. It is meant to be called from another workflow (matrixed over Python
# versions) and can also be dispatched manually for validation.
# Read more about reusable workflows: https://docs.github.com/en/actions/using-workflows/reusing-workflows#overview
#
# Service Events is bundled with Application Signals: enabling App Signals turns it on (Lambda
# excluded). The instrumented sample app then emits four signals autonomously, which this test
# validates end to end against CloudWatch:
#   - DeploymentEvent   (OTLP log,  group /aws/service-events/<service.name>) — emitted on startup
#   - IncidentSnapshot  (OTLP log,  same group)                              — exception-triggered by /mysql 500
#   - EndpointErrorMetric `count`            (OTLP metric, PromQL)           — the /mysql 500 + captured exception
#   - FunctionCall `service.function.duration` (OTLP metric, PromQL)        — scoped via PACKAGES_INCLUDE
#
# The two log signals use the existing cw-log validator; the two metric signals are native OTLP
# metrics with no fixed CloudWatch namespace, so they are validated with the PromQL validator
# against the CloudWatch Prometheus-compatible query API (monitoring.<region>.amazonaws.com).
name: Python EC2 Service Events Use Case
on:
  workflow_call:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      caller-workflow-name:
        required: true
        type: string
      python-version:
        description: "Currently support version 3.10, 3.11, 3.12, 3.13, 3.14"
        required: false
        type: string
        default: '3.10'
      cpu-architecture:
        description: "Permitted values: x86_64 or arm64"
        required: false
        type: string
        default: "x86_64"
      staging-wheel-name:
        required: false
        default: 'aws-opentelemetry-distro'
        type: string
      otel-source:
        required: false
        type: string
        default: 'github'
    outputs:
      job-started:
        value: ${{ jobs.python-ec2-service-events.outputs.job-started }}
      validation-result:
        value: ${{ jobs.python-ec2-service-events.outputs.validation-result }}
  workflow_dispatch:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      python-version:
        required: false
        type: string
        default: '3.10'

permissions:
  id-token: write
  contents: read

env:
  E2E_TEST_AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
  CALLER_WORKFLOW_NAME: ${{ inputs.caller-workflow-name || 'manual-dispatch' }}
  PYTHON_VERSION: ${{ inputs.python-version || '3.10' }}
  CPU_ARCHITECTURE: ${{ inputs.cpu-architecture || 'x86_64' }}
  ADOT_WHEEL_NAME: ${{ inputs.staging-wheel-name || 'aws-opentelemetry-distro' }}
  OTEL_SOURCE: ${{ inputs.otel-source || 'github' }}
  SAMPLE_APP_ZIP: s3://aws-appsignals-sample-app-prod-${{ inputs.aws-region || 'us-east-1' }}/python-sample-app.zip
  E2E_TEST_ACCOUNT_ID: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}
  E2E_TEST_ROLE_NAME: ${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
  TEST_RESOURCES_FOLDER: ${GITHUB_WORKSPACE}
  REPOSITORY_NAME: ${{ github.event.repository.name }}

jobs:
  python-ec2-service-events:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      job-started: ${{ steps.job-started.outputs.job-started }}
      validation-result: ${{ steps.validation-result.outputs.validation-result }}
    steps:
      - name: Check if the job started
        id: job-started
        run: echo "job-started=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
          fetch-depth: 0

        # We initialize Gradlew Daemon early on during the workflow because sometimes initialization
        # fails due to transient issues. If it fails here, then we will try again later before the validators
      - name: Initiate Gradlew Daemon
        id: initiate-gradlew
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      - name: Generate testing id
        run: echo TESTING_ID="${{ github.run_id }}-${{ github.run_number }}-${RANDOM}" >> "$GITHUB_ENV"

      - name: Set Service Name
        run: echo SERVICE_NAME="python-sample-application-${{ env.TESTING_ID }}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: us-east-1

      - name: Retrieve account
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids:
            ACCOUNT_ID, region-account/${{ env.E2E_TEST_AWS_REGION }}

      - name: Configure AWS Credentials
        if: ${{ env.REPOSITORY_NAME == 'aws-application-signals-test-framework' }}
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: ${{ env.E2E_TEST_AWS_REGION }}

      - name: Set Get ADOT Wheel command environment variable
        run: |
          if [ "${{ env.REPOSITORY_NAME }}" = "aws-otel-python-instrumentation" ]; then
            # Reusing the adot-main-build-staging-jar bucket to store the python wheel file
            echo GET_ADOT_WHEEL_COMMAND="aws s3 cp s3://adot-main-build-staging-jar/${{ env.ADOT_WHEEL_NAME }} ./${{ env.ADOT_WHEEL_NAME }} && sudo python${{ env.PYTHON_VERSION }} -m pip install ${{ env.ADOT_WHEEL_NAME }}" >> "$GITHUB_ENV"
          elif [ "${{ env.OTEL_SOURCE }}" == "pypi" ]; then
            echo GET_ADOT_WHEEL_COMMAND="sudo python${{ env.PYTHON_VERSION }} -m pip install ${{ env.ADOT_WHEEL_NAME }}" >> "$GITHUB_ENV"
          else
            # Service Events is not in any tagged ADOT Python release yet (it landed on main in
            # PR #763, after v0.17.1), so the standard releases/latest wheel has no serviceevents
            # code and emits no signals — the CW log group is never created and every validator
            # fails with ResourceNotFoundException. Install from git main until a release ships,
            # mirroring the DI canary. TODO: revert to the releases/latest wheel below once Service
            # Events is in a tagged release.
            #   latest_release_version=$(curl -sL https://github.com/aws-observability/aws-otel-python-instrumentation/releases/latest | grep -oP '/releases/tag/v\K[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
            #   GET_ADOT_WHEEL_COMMAND="wget -O ${{ env.ADOT_WHEEL_NAME }} https://github.com/aws-observability/aws-otel-python-instrumentation/releases/latest/download/aws_opentelemetry_distro-$latest_release_version-py3-none-any.whl && sudo python${{ env.PYTHON_VERSION }} -m pip install ${{ env.ADOT_WHEEL_NAME }}"
            echo GET_ADOT_WHEEL_COMMAND="sudo dnf install -y git && sudo python${{ env.PYTHON_VERSION }} -m pip install 'git+https://github.com/aws-observability/aws-otel-python-instrumentation.git@main#subdirectory=aws-opentelemetry-distro'" >> "$GITHUB_ENV"
          fi

      - name: Set Get CW Agent command environment variable
        run: |
          if [ "${{ env.REPOSITORY_NAME }}" = "amazon-cloudwatch-agent" ]; then
            echo GET_CW_AGENT_RPM_COMMAND="aws s3 cp s3://${{ secrets.S3_INTEGRATION_BUCKET }}/integration-test/binary/${{ github.sha }}/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm ./cw-agent.rpm" >> "$GITHUB_ENV"
          else
            if [ "${{ env.CPU_ARCHITECTURE }}" = "x86_64" ]; then
              echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ env.E2E_TEST_AWS_REGION }}.s3.${{ env.E2E_TEST_AWS_REGION }}.amazonaws.com/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
            elif [ "${{ env.CPU_ARCHITECTURE }}" = "arm64" ]; then
              echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ env.E2E_TEST_AWS_REGION }}.s3.${{ env.E2E_TEST_AWS_REGION }}.amazonaws.com/amazon_linux/arm64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
            fi
          fi

      - name: Set up terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg"
          post-command: 'echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              && sudo apt update && sudo apt install terraform'
          sleep_time: 60

      - name: Initiate Terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "cd ${{ env.TEST_RESOURCES_FOLDER }}/terraform/python/ec2/service-events && terraform init && terraform validate"
          cleanup: "rm -rf .terraform && rm -rf .terraform.lock.hcl"
          max_retry: 6
          sleep_time: 60

      - name: Deploy sample app via terraform and wait for endpoint to come online
        working-directory: terraform/python/ec2/service-events
        run: |
          # Attempt to deploy the sample app on an EC2 instance and wait for its endpoint to come online.
          # There may be occasional failures due to transitivity issues, so try up to 2 times.
          retry_counter=0
          max_retry=2
          while [ $retry_counter -lt $max_retry ]; do
            echo "Attempt $retry_counter"
            deployment_failed=0
            terraform apply -auto-approve \
              -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
              -var="test_id=${{ env.TESTING_ID }}" \
              -var="sample_app_zip=${{ env.SAMPLE_APP_ZIP }}" \
              -var="get_cw_agent_rpm_command=${{ env.GET_CW_AGENT_RPM_COMMAND }}" \
              -var="get_adot_wheel_command=${{ env.GET_ADOT_WHEEL_COMMAND }}" \
              -var="language_version=${{ env.PYTHON_VERSION }}" \
              -var="cpu_architecture=${{ env.CPU_ARCHITECTURE }}" \
            || deployment_failed=$?

            if [ $deployment_failed -eq 1 ]; then
              echo "Terraform deployment was unsuccessful. Will attempt to retry deployment."
              terraform destroy -auto-approve \
                -var="test_id=${{ env.TESTING_ID }}"
              retry_counter=$(($retry_counter+1))
            else
              break
            fi

            if [ $retry_counter -eq $max_retry ]; then
              echo "Max retry reached, failed to deploy terraform and connect to the endpoint. Exiting code"
              exit 1
            fi
          done

      - name: Get the ec2 instance ami id
        run: echo "EC2_INSTANCE_AMI=$(terraform output ec2_instance_ami)" >> "$GITHUB_ENV"
        working-directory: terraform/python/ec2/service-events

      - name: Get the sample app endpoint
        run: |
          echo "MAIN_SERVICE_ENDPOINT=localhost:8000" >> "$GITHUB_ENV"
          echo "MAIN_SERVICE_INSTANCE_ID=$(terraform output main_service_instance_id)" >> "$GITHUB_ENV"
        working-directory: terraform/python/ec2/service-events

      - name: Initiate Gradlew Daemon
        if: steps.initiate-gradlew.outcome == 'failure'
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      # ---- Service Events log signals (CloudWatch Logs: /aws/service-events/<service.name>) ----

      - name: Validate DeploymentEvent log
        id: deployment-event-validation
        run: ./gradlew validator:run --args='-c python/ec2/service-events/deployment-event-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.MAIN_SERVICE_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --rollup'

      - name: Validate IncidentSnapshot log
        id: incident-snapshot-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/service-events/incident-snapshot-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.MAIN_SERVICE_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --rollup'

      - name: Validate IncidentSnapshot log (latency trigger)
        id: incident-snapshot-latency-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/service-events/incident-snapshot-latency-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.MAIN_SERVICE_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --rollup'

      # ---- Service Events metric signals (native OTLP metrics, queried via PromQL) ----

      - name: Validate EndpointErrorMetric (count) via PromQL
        id: endpoint-error-metric-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure' || steps.incident-snapshot-latency-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/service-events/endpoint-error-metric-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.MAIN_SERVICE_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --rollup'

      - name: Validate FunctionCall (service.function.duration) via PromQL
        id: function-call-metric-validation
        if: (success() || steps.deployment-event-validation.outcome == 'failure' || steps.incident-snapshot-validation.outcome == 'failure' || steps.incident-snapshot-latency-validation.outcome == 'failure' || steps.endpoint-error-metric-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/service-events/function-call-metric-validation.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://${{ env.MAIN_SERVICE_ENDPOINT }}
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --rollup'

      - name: Refresh AWS Credentials
        if: ${{ env.REPOSITORY_NAME == 'aws-application-signals-test-framework' }}
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: ${{ env.E2E_TEST_AWS_REGION }}

      - name: Save test results
        if: always()
        id: validation-result
        run: |
          if [ "${{ steps.deployment-event-validation.outcome }}" = "success" ] && [ "${{ steps.incident-snapshot-validation.outcome }}" = "success" ] && [ "${{ steps.incident-snapshot-latency-validation.outcome }}" = "success" ] && [ "${{ steps.endpoint-error-metric-validation.outcome }}" = "success" ] && [ "${{ steps.function-call-metric-validation.outcome }}" = "success" ]; then
            echo "validation-result=success" >> "$GITHUB_OUTPUT"
          else
            echo "validation-result=failure" >> "$GITHUB_OUTPUT"
          fi

      # Clean up Procedures
      - name: Terraform destroy
        if: always()
        continue-on-error: true
        working-directory: terraform/python/ec2/service-events
        run: |
          terraform destroy -auto-approve \
            -var="test_id=${{ env.TESTING_ID }}"
