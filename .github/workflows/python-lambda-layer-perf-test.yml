name: Python Lambda Layer Performance Test
on:
  workflow_dispatch:
    inputs:
      test_runs:
        description: 'Number of test runs to perform'
        required: true
        default: 20
        type: number

      python_version:
        description: 'The Python version to run the test'
        required: true
        default: '3.13'
        type: string  
      
      ADOT-Python-Branch:
        description: 'ADOT branch to use'
        required: true
        default: 'main'
        type: string

jobs:
  python-lambda-layer-performance-test:
    runs-on: ubuntu-latest 
    permissions:
        id-token: write
        contents: read   

    env:
      NUM_TEST_RUNS: ${{ github.event.inputs.test_runs }}
      PYTHON_VERSION: ${{ github.event.inputs.python_version }}
      ADOT_PYTHON_BRANCH: ${{ github.event.inputs.ADOT-Python-Branch }}
  
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1     

    - name: Checkout aws-otel-python-instrumentation
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        repository: aws-observability/aws-otel-python-instrumentation
        ref: ${{ env.ADOT_PYTHON_BRANCH }}
        path: aws-otel-python-instrumentation

    - name: Log branch and commit info
      run: |
        cd aws-otel-python-instrumentation
        echo "ADOT Python Branch: ${{ env.ADOT_PYTHON_BRANCH }}"
        echo "ADOT Python Commit Hash: $(git rev-parse HEAD)"

    - name: Setup Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3.1.2

    - name: Build Lambda Layer
      run: |
        cd aws-otel-python-instrumentation/lambda-layer
        chmod +x build.sh
        ./build.sh

    - name: Checkout current repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        path: current-repo
    
    # Single combined run: Full SDK, Lite SDK (fast start), and No Layer (baseline)
    - name: Run Cold Start Iterations - All Scenarios
      run: |
        cd current-repo

        # The function is deployed with the layer already attached; capture its
        # ARN so the combined script can re-attach it for the SDK scenarios.
        LAYER_ARN=$(aws lambda get-function-configuration \
          --function-name aws-opentelemetry-distro-python \
          --query 'Layers[0].Arn' --output text)

        if [ -z "$LAYER_ARN" ] || [ "$LAYER_ARN" = "None" ]; then
          echo "::error::No layer attached to aws-opentelemetry-distro-python"
          exit 1
        fi
        echo "Using layer ARN: $LAYER_ARN"

        chmod +x lambda-layer-perf-test/lambda-perf-test-all.sh
        ./lambda-layer-perf-test/lambda-perf-test-all.sh aws-opentelemetry-distro-python "$LAYER_ARN"

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-performance-test-results
        path: |
          no_layer_results.txt
          layer_results.txt
          lite_sdk_results.txt
        retention-days: 90

    - name: Cleanup Terraform Resources
      if: success() || failure() || cancelled()
      run: |
        cd aws-otel-python-instrumentation/lambda-layer/terraform/lambda
        echo "Starting Terraform cleanup..."
        terraform init
        terraform destroy -auto-approve
