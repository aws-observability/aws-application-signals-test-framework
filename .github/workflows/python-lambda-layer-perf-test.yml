name: Python Lambda Layer Performance Test
on:
  workflow_dispatch:
    inputs:
      test_runs:
        description: 'Number of test runs to perform'
        required: true
        default: 20
        type: number

      python_version:
        description: 'The Python version to run the test'
        required: true
        default: '3.13'
        type: string

      ADOT-Python-Branch:
        description: 'ADOT branch to use'
        required: true
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      PYTHON_VERSION: ${{ github.event.inputs.python_version }}
      ADOT_PYTHON_BRANCH: ${{ github.event.inputs.ADOT-Python-Branch }}

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1

    - name: Checkout aws-otel-python-instrumentation
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        repository: aws-observability/aws-otel-python-instrumentation
        ref: ${{ env.ADOT_PYTHON_BRANCH }}
        path: aws-otel-python-instrumentation

    - name: Log branch and commit info
      run: |
        cd aws-otel-python-instrumentation
        echo "ADOT Python Branch: ${{ env.ADOT_PYTHON_BRANCH }}"
        echo "ADOT Python Commit Hash: $(git rev-parse HEAD)"

    - name: Setup Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Build Lambda Layer
      run: |
        cd aws-otel-python-instrumentation/lambda-layer/src
        chmod +x build-lambda-layer.sh
        ./build-lambda-layer.sh

    - name: Package Sample App
      run: |
        cd aws-otel-python-instrumentation/lambda-layer/sample-apps
        chmod +x package-lambda-function.sh
        ./package-lambda-function.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-lambda-build-artifacts
        path: |
          aws-otel-python-instrumentation/lambda-layer/src/build/aws-opentelemetry-python-layer.zip
          aws-otel-python-instrumentation/lambda-layer/sample-apps/build/function.zip
          aws-otel-python-instrumentation/lambda-layer/terraform/
        retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        mode: [full, lite, baseline]
        include:
          - mode: full
            result_file: layer_results.txt
          - mode: lite
            result_file: lite_layer_results.txt
          - mode: baseline
            result_file: no_layer_results.txt

    env:
      NUM_TEST_RUNS: ${{ github.event.inputs.test_runs }}
      FUNCTION_NAME: aws-opentelemetry-distro-python-${{ matrix.mode }}-${{ github.run_id }}
      LAYER_NAME: AWSOpenTelemetryDistroPython-${{ matrix.mode }}-${{ github.run_id }}

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
      with:
        role-to-assume: arn:aws:iam::${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ACCOUNT_ID }}:role/${{ secrets.APPLICATION_SIGNALS_E2E_TEST_ROLE_NAME }}
        aws-region: us-east-1

    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: python-lambda-build-artifacts
        path: aws-otel-python-instrumentation/lambda-layer

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3.1.2

    - name: Deploy Lambda Function
      run: |
        cd aws-otel-python-instrumentation/lambda-layer/terraform/lambda
        terraform init
        terraform apply -auto-approve \
          -var="function_name=${{ env.FUNCTION_NAME }}" \
          -var="sdk_layer_name=${{ env.LAYER_NAME }}"

    - name: Remove Application Signals Lambda Layer
      if: matrix.mode == 'baseline'
      run: |
        echo "Removing Lambda layer..."

        OUTPUT=$(aws lambda update-function-configuration \
            --function-name ${{ env.FUNCTION_NAME }} \
            --layers [])

        echo "Lambda configuration:"
        echo "$OUTPUT"

        LAYERS=$(echo "$OUTPUT" | jq -r '.Layers | length')

        if [ "$LAYERS" -ne 0 ]; then
            echo "::error::Found $LAYERS layer(s) still attached to the function"
            echo "::error::Layer details:"
            echo "$OUTPUT" | jq -r '.Layers'
            exit 1
        else
            echo "Layers successfully removed"
        fi

    - name: Checkout current repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        path: current-repo

    - name: Run Cold Start Iterations (${{ matrix.mode }})
      run: |
        cd current-repo
        chmod +x lambda-layer-perf-test/lambda-layer-run.sh
        ./lambda-layer-perf-test/lambda-layer-run.sh ${{ matrix.mode }} ${{ env.FUNCTION_NAME }}

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-${{ matrix.mode }}-results
        path: ${{ matrix.result_file }}
        retention-days: 90

    - name: Cleanup Terraform Resources
      if: success() || failure() || cancelled()
      run: |
        cd aws-otel-python-instrumentation/lambda-layer/terraform/lambda
        echo "Starting Terraform cleanup..."
        terraform init
        terraform destroy -auto-approve \
          -var="function_name=${{ env.FUNCTION_NAME }}" \
          -var="sdk_layer_name=${{ env.LAYER_NAME }}"

  collect-results:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Download all test results
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        pattern: python-*-results
        merge-multiple: true
        path: results

    - name: Upload combined results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-performance-test-results
        path: results/
        retention-days: 90
