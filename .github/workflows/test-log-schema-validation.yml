## Temporary workflow to test log schema validation on this branch.
## Remove before merging to main.
name: Test Log Schema Validation
on:
  push:
    branches:
      - Cross_Language_Validation

permissions:
  id-token: write
  contents: read

jobs:
  test-log-schema-python:
    uses: ./.github/workflows/python-lambda-test.yml
    secrets: inherit
    with:
      aws-region: us-west-2
      python-version: '3.12'
      caller-workflow-name: 'test-log-schema'
