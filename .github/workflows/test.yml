# Reusable workflow for the Python EC2 Dynamic Instrumentation (DI) E2E canary.
# Closed loop: Create breakpoint via Application Signals control plane → SDK polls
# and applies → traffic hits breakpoint → snapshot lands in /aws/service-events/<svc>
# → assert snapshot fields → Delete config.
name: Test
on:
  workflow_dispatch:
    inputs:
      aws-region:
        description: AWS region to deploy the test in
        required: false
        type: string
        default: 'us-east-1'
      caller-workflow-name:
        description: Identifier propagated from the caller; use 'manual' for ad-hoc dispatch
        required: false
        type: string
        default: 'manual'
      cpu-architecture:
        required: false
        type: string
        default: 'x86_64'
      staging-wheel-name:
        required: false
        default: 'aws-opentelemetry-distro'
        type: string
      otel-source:
        required: false
        type: string
        default: 'github'

  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      caller-workflow-name:
        required: true
        type: string
      cpu-architecture:
        required: false
        type: string
        default: 'x86_64'
      staging-wheel-name:
        required: false
        default: 'aws-opentelemetry-distro'
        type: string
      otel-source:
        required: false
        type: string
        default: 'github'

permissions:
  id-token: write
  contents: read

env:
  E2E_TEST_AWS_REGION: ${{ inputs.aws-region }}
  CALLER_WORKFLOW_NAME: ${{ inputs.caller-workflow-name }}
  CPU_ARCHITECTURE: ${{ inputs.cpu-architecture }}
  ADOT_WHEEL_NAME: ${{ inputs.staging-wheel-name }}
  OTEL_SOURCE: ${{ inputs.otel-source }}
  SAMPLE_APP_ZIP: s3://aws-appsignals-sample-app-di-us-east-1/python-sample-app.zip
  TRAFFIC_GENERATOR_ZIP: s3://aws-appsignals-sample-app-di-us-east-1/traffic-generator.zip
  E2E_TEST_ACCOUNT_ID: ${{ secrets.APPLICATION_SIGNALS_DI_E2E_TEST_ACCOUNT_ID }}
  E2E_TEST_ROLE_NAME: ${{ secrets.APPLICATION_SIGNALS_DI_E2E_TEST_ROLE_NAME }}
  TEST_RESOURCES_FOLDER: ${GITHUB_WORKSPACE}
  REPOSITORY_NAME: ${{ github.event.repository.name }}
  DI_API_URL: https://application-signals.us-east-1.api.aws
  # Single source of truth for the service identity. Must match the values terraform
  # exports as OTEL_SERVICE_NAME / OTEL_RESOURCE_ATTRIBUTES inside the EC2 user-data;
  # we pass them as terraform vars below so the values stay in sync.
  SERVICE_NAME_PREFIX: python-sample-application
  DI_ENVIRONMENT: ec2:python-di-main-service-asg
  # IAM instance profile used by the EC2 sample-app instance. Overrides the default in
  # variables.tf — required while the canonical APP_SIGNALS_EC2_TEST_ROLE doesn't exist
  # in the DI E2E account; this profile already has CW Agent + S3 read + DI permissions.
  IAM_INSTANCE_PROFILE: di-soak-test-ec2-profile

jobs:
  python-ec2-adot-di:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # 3.10/3.11 use BytecodeInjectionEngine; 3.12+ uses SysMonitoringEngine.
        # 3.10 exercises the SETUP_WITH-based pre-3.11 wrapping path; 3.11 the
        # disjoint TryBegin/TryEnd path; 3.12 sys.monitoring.
        python-version: ['3.10', '3.11', '3.12']
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'aws-observability/aws-application-signals-test-framework'
          ref: ${{ inputs.caller-workflow-name == 'main-build' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Initiate Gradlew Daemon
        id: initiate-gradlew
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      - name: Generate testing id
        run: echo TESTING_ID="${{ github.run_id }}-${{ github.run_number }}-${RANDOM}" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 # v5.0.0
        with:
          role-to-assume: arn:aws:iam::${{ env.E2E_TEST_ACCOUNT_ID }}:role/${{ env.E2E_TEST_ROLE_NAME }}
          aws-region: ${{ env.E2E_TEST_AWS_REGION }}

      - name: Set Get ADOT Wheel command environment variable
        # DI PROBE on Django requires _patch_django_url_patterns so the wrapper
        # reaches Django's URLPattern.callback cache (PR #776). Without it,
        # setattr-replacing the views module doesn't update Django's resolver
        # tree and breakpoints silently never fire. Once #776 merges to
        # upstream main and ships in a tagged release, switch back to the
        # standard 3-source pattern (S3 staging / PyPI / GitHub release).
        run: |
          echo GET_ADOT_WHEEL_COMMAND="sudo python${{ env.PYTHON_VERSION }} -m pip install 'git+https://github.com/liustve/aws-otel-python-instrumentation.git@di/django-url-patcher#subdirectory=aws-opentelemetry-distro'" >> "$GITHUB_ENV"

      - name: Set Get CW Agent command environment variable
        run: |
          if [ "${{ env.CPU_ARCHITECTURE }}" = "x86_64" ]; then
            echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ inputs.aws-region }}.s3.${{ inputs.aws-region }}.amazonaws.com/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
          elif [ "${{ env.CPU_ARCHITECTURE }}" = "arm64" ]; then
            echo GET_CW_AGENT_RPM_COMMAND="wget -O cw-agent.rpm https://amazoncloudwatch-agent-${{ inputs.aws-region }}.s3.${{ inputs.aws-region }}.amazonaws.com/amazon_linux/arm64/latest/amazon-cloudwatch-agent.rpm" >> "$GITHUB_ENV"
          fi

      - name: Install awscurl for SigV4-signed control-plane calls
        run: pip install awscurl

      - name: Set up terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg"
          post-command: 'echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              && sudo apt update && sudo apt install terraform'
          sleep_time: 60

      - name: Initiate Terraform
        uses: ./.github/workflows/actions/execute_and_retry
        with:
          command: "cd ${{ env.TEST_RESOURCES_FOLDER }}/terraform/python/ec2/adot-di && terraform init && terraform validate"
          cleanup: "rm -rf .terraform && rm -rf .terraform.lock.hcl"
          max_retry: 6
          sleep_time: 60

      - name: Deploy sample app via terraform
        working-directory: terraform/python/ec2/adot-di
        run: |
          retry_counter=0
          max_retry=2
          while [ $retry_counter -lt $max_retry ]; do
            echo "Attempt $retry_counter"
            deployment_failed=0
            terraform apply -auto-approve \
              -var="aws_region=${{ env.E2E_TEST_AWS_REGION }}" \
              -var="test_id=${{ env.TESTING_ID }}" \
              -var="sample_app_zip=${{ env.SAMPLE_APP_ZIP }}" \
              -var="get_cw_agent_rpm_command=${{ env.GET_CW_AGENT_RPM_COMMAND }}" \
              -var="get_adot_wheel_command=${{ env.GET_ADOT_WHEEL_COMMAND }}" \
              -var="language_version=${{ env.PYTHON_VERSION }}" \
              -var="cpu_architecture=${{ env.CPU_ARCHITECTURE }}" \
              -var="di_api_url=${{ env.DI_API_URL }}" \
              -var="service_name_prefix=${{ env.SERVICE_NAME_PREFIX }}" \
              -var="di_environment=${{ env.DI_ENVIRONMENT }}" \
              -var="iam_instance_profile=${{ env.IAM_INSTANCE_PROFILE }}" \
              -var="traffic_generator_zip=${{ env.TRAFFIC_GENERATOR_ZIP }}" \
            || deployment_failed=$?

            if [ $deployment_failed -eq 1 ]; then
              echo "Terraform deployment was unsuccessful. Will attempt to retry deployment."
              terraform destroy -auto-approve \
                -var="test_id=${{ env.TESTING_ID }}"
              retry_counter=$(($retry_counter+1))
            else
              break
            fi

            if [ $retry_counter -eq $max_retry ]; then
              echo "Max retry reached, failed to deploy terraform and connect to the endpoint."
              exit 1
            fi
          done

      - name: Capture deployment outputs
        working-directory: terraform/python/ec2/adot-di
        run: |
          echo "EC2_INSTANCE_AMI=$(terraform output ec2_instance_ami)" >> "$GITHUB_ENV"
          echo "MAIN_SERVICE_INSTANCE_ID=$(terraform output main_service_instance_id)" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=${{ env.SERVICE_NAME_PREFIX }}-${{ env.TESTING_ID }}" >> "$GITHUB_ENV"

      - name: Create instrumentation configurations
        # 4 cells, one per distinct SDK code path. Naming is <Level><Type>[Exception]:
        #   lineBreakpoint        → views.http_call:134           (line engine)
        #   methodProbe           → views.aws_sdk_call            (function wrapper, PROBE path)
        #   methodBreakpoint      → views.downstream_service      (function wrapper, BREAKPOINT path)
        #   methodProbeException  → views.mysql                   (function wrapper throwable capture)
        # Note: there is no lineProbe — both ADOT Python and ADOT Java force line_number=0
        # for any PROBE config, so a (PROBE, line) request degenerates to (PROBE, method).
        # There is also no lineBreakpointException because the line engine has no
        # exception-capture machinery; line snapshots fire pre-execution and emit no throwable.
        run: |
          export SERVICE_NAME DI_ENVIRONMENT="${{ env.DI_ENVIRONMENT }}"
          export EXPIRES_AT=$(($(date +%s) + 1800))
          P=.github/workflows/util/di-payload.py

          for KIND in LineBreakpoint MethodProbe MethodBreakpoint MethodProbeException; do
            RESP=$(awscurl --service application-signals --region ${{ env.E2E_TEST_AWS_REGION }} \
              -X POST -H "content-type: application/json" -d "$(python3 $P "create${KIND}")" \
              ${{ env.DI_API_URL }}/create-instrumentation-configuration)
            echo "$KIND Create response: $RESP"
            HASH=$(echo "$RESP" | jq -r '.LocationHash // empty')
            if [ -z "$HASH" ]; then echo "ERROR: $KIND Create did not return LocationHash"; exit 1; fi
            # Map KIND → SCREAMING_SNAKE env var name (LineBreakpoint → LINE_BREAKPOINT_LOCATION_HASH).
            VAR_NAME=$(echo "$KIND" | sed -E 's/([a-z0-9])([A-Z])/\1_\2/g' | tr '[:lower:]' '[:upper:]')_LOCATION_HASH
            echo "${VAR_NAME}=${HASH}" >> "$GITHUB_ENV"
            echo "$KIND OK: ${VAR_NAME}=${HASH}"
          done

      - name: Verify all Get calls return the created configurations
        run: |
          export SERVICE_NAME DI_ENVIRONMENT="${{ env.DI_ENVIRONMENT }}"
          P=.github/workflows/util/di-payload.py

          for pair in "LineBreakpoint:${LINE_BREAKPOINT_LOCATION_HASH}" "MethodProbe:${METHOD_PROBE_LOCATION_HASH}" "MethodBreakpoint:${METHOD_BREAKPOINT_LOCATION_HASH}" "MethodProbeException:${METHOD_PROBE_EXCEPTION_LOCATION_HASH}"; do
            KIND="${pair%%:*}"; HASH="${pair##*:}"
            export LOCATION_HASH="$HASH"
            BODY=$(awscurl --service application-signals --region ${{ env.E2E_TEST_AWS_REGION }} \
              -X POST -H "content-type: application/json" -d "$(python3 "$P" "get${KIND}")" \
              ${{ env.DI_API_URL }}/get-instrumentation-configuration)
            echo "$KIND Get response: $BODY"
            GOT_HASH=$(echo "$BODY" | jq -r '.Configuration.LocationHash // empty')
            if [ "$GOT_HASH" != "$HASH" ]; then
              echo "ERROR: $KIND Get returned hash=$GOT_HASH, expected $HASH"
              exit 1
            fi
            echo "$KIND Get OK"
          done

      - name: Wait for SDK to poll, apply, and emit snapshots
        run: sleep 90

      - name: Initiate Gradlew Daemon
        if: steps.initiate-gradlew.outcome == 'failure'
        uses: ./.github/workflows/actions/execute_and_retry
        continue-on-error: true
        with:
          command: "./gradlew :validator:build"
          cleanup: "./gradlew clean"
          max_retry: 3
          sleep_time: 60

      - name: Validate lineBreakpoint snapshot in CW Logs
        id: line-breakpoint-validation
        run: ./gradlew validator:run --args='-c python/ec2/adot-di/log-validation-line-breakpoint.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://localhost:8000
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --location-hash ${{ env.LINE_BREAKPOINT_LOCATION_HASH }}'

      - name: Validate methodProbe snapshot in CW Logs
        id: method-probe-validation
        if: (success() || steps.line-breakpoint-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/adot-di/log-validation-method-probe.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://localhost:8000
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --location-hash ${{ env.METHOD_PROBE_LOCATION_HASH }}'

      - name: Validate methodBreakpoint snapshot in CW Logs
        id: method-breakpoint-validation
        if: (success() || steps.method-probe-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/adot-di/log-validation-method-breakpoint.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://localhost:8000
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --location-hash ${{ env.METHOD_BREAKPOINT_LOCATION_HASH }}'

      - name: Validate methodProbeException snapshot in CW Logs
        id: method-probe-exception-validation
        if: (success() || steps.method-breakpoint-validation.outcome == 'failure') && !cancelled()
        run: ./gradlew validator:run --args='-c python/ec2/adot-di/log-validation-method-probe-exception.yml
          --testing-id ${{ env.TESTING_ID }}
          --endpoint http://localhost:8000
          --region ${{ env.E2E_TEST_AWS_REGION }}
          --log-group /aws/service-events/${{ env.SERVICE_NAME }}
          --service-name ${{ env.SERVICE_NAME }}
          --instance-ami ${{ env.EC2_INSTANCE_AMI }}
          --instance-id ${{ env.MAIN_SERVICE_INSTANCE_ID }}
          --location-hash ${{ env.METHOD_PROBE_EXCEPTION_LOCATION_HASH }}'

      - name: Delete instrumentation configurations
        id: delete-configs
        if: always() && (env.LINE_BREAKPOINT_LOCATION_HASH != '' || env.METHOD_PROBE_LOCATION_HASH != '' || env.METHOD_BREAKPOINT_LOCATION_HASH != '' || env.METHOD_PROBE_EXCEPTION_LOCATION_HASH != '')
        continue-on-error: true
        run: |
          export SERVICE_NAME DI_ENVIRONMENT="${{ env.DI_ENVIRONMENT }}"
          P=.github/workflows/util/di-payload.py

          for pair in "LineBreakpoint:${LINE_BREAKPOINT_LOCATION_HASH}" "MethodProbe:${METHOD_PROBE_LOCATION_HASH}" "MethodBreakpoint:${METHOD_BREAKPOINT_LOCATION_HASH}" "MethodProbeException:${METHOD_PROBE_EXCEPTION_LOCATION_HASH}"; do
            KIND="${pair%%:*}"; HASH="${pair##*:}"
            if [ -z "$HASH" ]; then continue; fi
            export LOCATION_HASH="$HASH"
            RESP=$(awscurl --service application-signals --region ${{ env.E2E_TEST_AWS_REGION }} \
              -X POST -H "content-type: application/json" -d "$(python3 "$P" "delete${KIND}")" \
              ${{ env.DI_API_URL }}/delete-instrumentation-configuration)
            echo "$KIND Delete response: $RESP"
            STATUS=$(echo "$RESP" | jq -r '.DeletionStatus // empty')
            if [ "$STATUS" != "DELETED" ]; then
              echo "ERROR: $KIND Delete returned DeletionStatus=$STATUS, expected DELETED"
              exit 1
            fi
            echo "$KIND deleted"
          done

      - name: Verify all Get calls return ResourceNotFound after delete
        if: always() && steps.delete-configs.outcome == 'success'
        run: |
          export SERVICE_NAME DI_ENVIRONMENT="${{ env.DI_ENVIRONMENT }}"
          P=.github/workflows/util/di-payload.py

          for pair in "LineBreakpoint:${LINE_BREAKPOINT_LOCATION_HASH}" "MethodProbe:${METHOD_PROBE_LOCATION_HASH}" "MethodBreakpoint:${METHOD_BREAKPOINT_LOCATION_HASH}" "MethodProbeException:${METHOD_PROBE_EXCEPTION_LOCATION_HASH}"; do
            KIND="${pair%%:*}"; HASH="${pair##*:}"
            if [ -z "$HASH" ]; then continue; fi
            export LOCATION_HASH="$HASH"
            BODY=$(awscurl --service application-signals --region ${{ env.E2E_TEST_AWS_REGION }} \
              -X POST -H "content-type: application/json" -d "$(python3 "$P" "get${KIND}")" \
              ${{ env.DI_API_URL }}/get-instrumentation-configuration 2>&1 || true)
            echo "$KIND post-delete Get: $BODY"
            if ! echo "$BODY" | grep -qiE "ResourceNotFound|not found|does not exist|has been deleted"; then
              echo "ERROR: $KIND configuration still exists after Delete"
              exit 1
            fi
            echo "$KIND post-delete Get OK"
          done

      - name: Terraform destroy
        if: always()
        continue-on-error: true
        working-directory: terraform/python/ec2/adot-di
        run: |
          terraform destroy -auto-approve \
            -var="test_id=${{ env.TESTING_ID }}"
