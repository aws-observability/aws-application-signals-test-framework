## This workflow aims to run the Application Signals end-to-end tests as a canary to
## test the artifacts for App Signals enablement. It will deploy a sample app and remote
## service on two EC2 instances, call the APIs, and validate the generated telemetry,
## including logs, metrics, and traces.
name: Test
on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  e2e-ec2-default-test:
    strategy:
      fail-fast: false
      matrix:
        aws-region: ['us-east-1', 'af-south-1','ap-east-1','ap-northeast-1']
    uses: ./.github/workflows/application-signals-java-e2e-ec2-asg-test.yml
    secrets: inherit
    with:
      aws-region: ${{ matrix.aws-region }}
      caller-workflow-name: 'test'
      result-folder: 'default-e2e-test-result'

  publish-result:
    strategy:
      fail-fast: false
      matrix:
        aws-region: [ 'us-east-1', 'af-south-1','ap-east-1','ap-northeast-1' ]
    uses: ./.github/workflows/e2e-test-publish-result.yml
    secrets: inherit
    with:
      aws-region: ${{ matrix.aws-region }}
      caller-workflow-name: 'test'
      result-folder: 'default-e2e-test-result'