## Temporary cross-language dispatch caller for DI E2E version-matrix validation.
## DO NOT MERGE — drop this file before finalizing the PR.
name: Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  python-adot-di:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    uses: ./.github/workflows/python-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      python-version: ${{ matrix.python-version }}

  java-adot-di:
    strategy:
      fail-fast: false
      matrix:
        java-version: ['8', '11', '17', '21', '25']
    uses: ./.github/workflows/java-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      java-version: ${{ matrix.java-version }}

  node-adot-di:
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22', '24']
    uses: ./.github/workflows/node-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      node-version: ${{ matrix.node-version }}
