# Temporary dispatch caller for validating EKS Service Events workflows on this branch.
# Remove after the EKS SE tests are confirmed passing and merged to main.
name: EKS SE Test Dispatch
on:
  workflow_dispatch:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
      test-cluster-name:
        required: false
        type: string
        default: 'e2e-test-cluster'
      language:
        description: 'Which language to test (python, java, node, all)'
        required: false
        type: string
        default: 'all'

permissions:
  id-token: write
  contents: read

jobs:
  python:
    if: ${{ inputs.language == 'all' || inputs.language == 'python' }}
    uses: ./.github/workflows/python-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'test-dispatch'

  java:
    if: ${{ inputs.language == 'all' || inputs.language == 'java' }}
    uses: ./.github/workflows/java-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'test-dispatch'

  node:
    if: ${{ inputs.language == 'all' || inputs.language == 'node' }}
    uses: ./.github/workflows/node-eks-service-events-test.yml
    secrets: inherit
    with:
      aws-region: ${{ inputs.aws-region }}
      test-cluster-name: ${{ inputs.test-cluster-name }}
      caller-workflow-name: 'test-dispatch'
