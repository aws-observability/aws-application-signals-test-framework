## Temporary cross-branch dispatch caller for the Node EC2 DI E2E validation.
## DO NOT MERGE — drop this file before finalizing the PR.
name: Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  node-ec2-adot-di:
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22', '24']
    uses: ./.github/workflows/node-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      node-version: ${{ matrix.node-version }}
