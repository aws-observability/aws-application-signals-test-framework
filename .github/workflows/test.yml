## Temporary cross-branch dispatch caller for Java/Node SE E2E validation.
## DO NOT MERGE — drop this file before finalizing the PR.
name: Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  java-ec2-adot-di:
    uses: ./.github/workflows/java-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      java-version: '25'

  java-ec2-service-events:
    uses: ./.github/workflows/java-ec2-service-events-test.yml
    secrets: inherit
    with:
      caller-workflow-name: 'test'

  node-ec2-service-events:
    uses: ./.github/workflows/node-ec2-service-events-test.yml
    secrets: inherit
    with:
      caller-workflow-name: 'test'
