## Temporary cross-branch dispatch caller for the Java EC2 DI E2E validation.
## DO NOT MERGE — drop this file before finalizing the PR.
name: Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  java-ec2-adot-di:
    strategy:
      fail-fast: false
      matrix:
        java-version: ['8', '11', '17', '21', '25']
    uses: ./.github/workflows/java-ec2-adot-di-test.yml
    secrets: inherit
    with:
      aws-region: 'us-east-1'
      caller-workflow-name: 'test'
      java-version: ${{ matrix.java-version }}
