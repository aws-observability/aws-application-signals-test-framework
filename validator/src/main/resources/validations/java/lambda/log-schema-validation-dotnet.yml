# Log schema validation for .NET.
# Uses a separate template because .NET's observedTimeUnixNano is always 0.
-
  validationType: "cw-log"
  httpPath: "/lambda-invoke"
  callingType: "lambda-invoke"
  expectedLogStructureTemplate: "LAMBDA_LOG_SCHEMA_DOTNET"
  cwLogFilterPattern: "{ ($.timeUnixNano = \"*\") }"