# Shared log schema validation for Java, Python, and JS.
# Console and OTLP now share the same field names — validated with a single template.
# Console logs are identified by timeUnixNano in the default Lambda log stream.
# OTLP logs land in the otlp-logs stream via the CloudWatch OTLP endpoint.
-
  validationType: "cw-log"
  httpPath: "/lambda-invoke"
  callingType: "lambda-invoke"
  expectedLogStructureTemplate: "LAMBDA_LOG_SCHEMA"
  cwLogFilterPattern: "{ ($.timeUnixNano = \"*\") }"