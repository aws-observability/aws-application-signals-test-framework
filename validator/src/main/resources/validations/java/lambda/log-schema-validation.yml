# Shared log schema validation for Java, Python, and JS.
# Validates console log format from Lambda stdout.
# Console logs are identified by the presence of a timestamp field (ISO-8601).
# OTLP validation can be added when the test IAM role has logs:CreateLogStream permission.
-
  validationType: "cw-log"
  httpPath: "/lambda-invoke"
  callingType: "lambda-invoke"
  expectedLogStructureTemplate: "JAVA_LAMBDA_CONSOLE_LOG_SCHEMA"
  cwLogFilterPattern: "{ ($.timestamp = \"*\") }"